<!-- splash.html -->
<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
        color: #1e293b;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .splash-container {
        text-align: center;
        padding: 40px;
        max-width: 400px;
        width: 100%;
        animation: fadeIn 0.5s ease-out;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        height: 100vh;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1 {
        font-size: 42px;
        font-weight: 700;
        margin-bottom: 10px;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, #0e9d7c 0%, #1ab394 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-align: center;
        width: 100%;
      }

      .subtitle {
        font-size: 16px;
        font-weight: 400;
        opacity: 0.7;
        margin-bottom: 40px;
        text-align: center;
        width: 100%;
        color: #64748b;
      }

      .loading-container {
        width: 100%;
        text-align: center;
        position: absolute;
        bottom: 100px;
        left: 0;
        right: 0;
        padding: 0 40px;
      }

      .loading-text {
        font-size: 14px;
        margin-bottom: 10px;
        opacity: 0.8;
        height: 20px;
        transition: opacity 0.3s ease;
        text-align: center;
        color: #1e293b;
      }

      .loading-bar {
        width: 100%;
        height: 6px;
        background: #e5e7eb;
        border-radius: 3px;
        overflow: hidden;
        margin-bottom: 15px;
      }

      .loading-progress {
        height: 100%;
        background: linear-gradient(90deg, #0e9d7c, #1ab394, #10b981);
        border-radius: 3px;
        width: 0%;
        transition: width 0.3s ease;
      }

      .version {
        position: absolute;
        bottom: 20px;
        font-size: 12px;
        opacity: 0.6;
        text-align: center;
        width: 100%;
        left: 0;
        right: 0;
        color: #64748b;
      }

      .dots {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 15px;
      }

      .dot {
        width: 10px;
        height: 10px;
        background: rgba(14, 157, 124, 0.3);
        border-radius: 50%;
        animation: pulse 1.4s ease-in-out infinite;
      }

      .dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.3;
          background-color: rgba(14, 157, 124, 0.3);
        }
        50% {
          transform: scale(1.2);
          opacity: 1;
          background-color: #0e9d7c;
        }
      }

      .company {
        position: absolute;
        bottom: 50px;
        font-size: 12px;
        opacity: 0.6;
        font-weight: 300;
        text-align: center;
        width: 100%;
        left: 0;
        right: 0;
        color: #64748b;
      }

      .center-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        margin-top: -80px;
      }
    </style>
  </head>
  <body>
    <div class="splash-container">
      <div class="center-content">
        <h1>Stashify</h1>
        <div class="subtitle">Inventory Management System</div>
      </div>

      <div class="loading-container">
        <div class="loading-text" id="loadingText">
          Initializing application...
        </div>
        <div class="loading-bar">
          <div class="loading-progress" id="loadingProgress"></div>
        </div>

        <div class="dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>

      <div class="company">© 2026 v0.0.5-beta</div>
      <div class="version">...</div>
    </div>
  </body>
</html>
